name: Daily Stock Analysis

on:
  workflow_dispatch:
    inputs:
      send_line:
        description: "Send LINE broadcast after publishing"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    # 00:30 UTC = 08:30 Asia/Taipei.
    - cron: "30 0 * * 1-5"

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    env:
      CONFIG: configs/rss.example.json
      REPORT_BASE_URL: https://rosana1517.github.io/Daily-Stock-Analysis/reports
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Refresh RSS and TWSE data
        run: python -m stock_signal_system.cli refresh-data --config "$CONFIG"

      - name: Validate config
        run: python -m stock_signal_system.cli validate-config --config "$CONFIG"

      - name: Generate report without LINE
        run: python -m stock_signal_system.cli run --config "$CONFIG"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish report to repository
        run: |
          latest_report="$(ls -t reports/stock_signals_*.html | head -n 1)"
          python -m stock_signal_system.cli publish-pages \
            --report-html "$latest_report" \
            --repo-dir . \
            --public-base-url "$REPORT_BASE_URL"

      - name: Send LINE report link
        if: ${{ (github.event_name == 'schedule') || (github.event.inputs.send_line == 'true') }}
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: python -m stock_signal_system.cli run --config "$CONFIG"
